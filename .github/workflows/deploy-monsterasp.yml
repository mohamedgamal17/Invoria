name: Deploy to MonsterASP

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    env:
      PROD_WEBSITE_NAME: ${{ secrets.PROD_WEBSITE_NAME }}
      PROD_SERVER_COMPUTER_NAME: ${{ secrets.PROD_SERVER_COMPUTER_NAME }}
      PROD_SERVER_USERNAME: ${{ secrets.PROD_SERVER_USERNAME }}
      PROD_SERVER_PASSWORD: ${{ secrets.PROD_SERVER_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --no-build --verbosity normal

      - name: Publish
        run: dotnet publish --configuration Release --output ./publish --runtime win-x86 --self-contained false

      - name: Deploy via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.2.0
        with:
          website-name: ${{ env.PROD_WEBSITE_NAME }}
          server-computer-name: ${{ env.PROD_SERVER_COMPUTER_NAME }}
          server-username: ${{ env.PROD_SERVER_USERNAME }}
          server-password: ${{ env.PROD_SERVER_PASSWORD }}
          source-path: ./publish
