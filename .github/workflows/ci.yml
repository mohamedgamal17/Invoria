name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: ${{ secrets.CI_SQL_SA_PASSWORD != '' && secrets.CI_SQL_SA_PASSWORD || 'Invoria_CI_Strong_P@ssw0rd!' }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd "(/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $MSSQL_SA_PASSWORD -Q 'SELECT 1' || /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $MSSQL_SA_PASSWORD -C -Q 'SELECT 1') || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    env:
      DOTNET_NOLOGO: true
      CI_SQL_SA_PASSWORD: ${{ secrets.CI_SQL_SA_PASSWORD != '' && secrets.CI_SQL_SA_PASSWORD || 'Invoria_CI_Strong_P@ssw0rd!' }}
      CI_DB_CONNECTION_STRING: Server=localhost,1433;Database=Invoria_CI;User Id=sa;Password=${{ secrets.CI_SQL_SA_PASSWORD != '' && secrets.CI_SQL_SA_PASSWORD || 'Invoria_CI_Strong_P@ssw0rd!' }};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=True

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore Invoria.sln

      - name: Build solution
        run: dotnet build Invoria.sln --configuration Release --no-restore

      - name: Install sqlcmd client
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl -fsSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev

      - name: Wait for SQL Server readiness
        shell: bash
        run: |
          for i in {1..30}; do
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$CI_SQL_SA_PASSWORD" -C -Q "SELECT 1" && break
            if [ "$i" -eq 30 ]; then
              echo "SQL Server did not become ready in time."
              exit 1
            fi
            sleep 2
          done

      - name: Run all test projects
        shell: pwsh
        env:
          ConnectionStrings__Default: ${{ env.CI_DB_CONNECTION_STRING }}
          ConnectionStrings__Rebus: ${{ env.CI_DB_CONNECTION_STRING }}
        run: |
          New-Item -Path "TestResults" -ItemType Directory -Force | Out-Null

          $testProjects = @(
            "tests/Invoria.Application.Tests/Invoria.Application.Tests.csproj"
            "tests/Invoria.Endpoints.Tests/Invoria.Endpoints.Tests.csproj"
            "tests/Modules/Catalog/Catalog.Application.Tests/Invoria.Catalog.Application.Tests.csproj"
            "tests/Modules/Catalog/Catalog.Endpoints.Tests/Invoria.Catalog.Endpoints.Tests.csproj"
            "tests/Modules/CustomerManagement/CustomerManagement.Application.Tests/Invoria.CustomerManagement.Application.Tests.csproj"
            "tests/Modules/CustomerManagement/CustomerManagement.Endpoints.Tests/Invoria.CustomerManagement.Endpoints.Tests.csproj"
            "tests/Modules/Inventory/Inventory.Application.Tests/Invoria.Inventory.Application.Tests.csproj"
            "tests/Modules/Inventory/Inventory.Endpoints.Tests/Invoria.Inventory.Endpoints.Tests.csproj"
            "tests/Modules/Ordering/Ordering.Application.Tests/Invoria.Ordering.Application.Tests.csproj"
            "tests/Modules/Ordering/Ordering.Endpoints.Tests/Invoria.Ordering.Endpoints.Tests.csproj"
            "tests/Modules/Procurement/Procurement.Application.Tests/Invoria.Procurement.Application.Tests.csproj"
            "tests/Modules/Procurement/Procurement.Endpoints.Tests/Invoria.Procurement.Endpoints.Tests.csproj"
          )

          foreach ($project in $testProjects) {
            $projectName = [System.IO.Path]::GetFileNameWithoutExtension($project)
            dotnet test $project `
              --configuration Release `
              --no-build `
              --logger "trx;LogFileName=$projectName.trx" `
              --results-directory "TestResults/$projectName"
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: error
