name: CI



on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: ${{ secrets.CI_SQL_SA_PASSWORD != '' && secrets.CI_SQL_SA_PASSWORD || 'Invoria_CI_Strong_P@ssw0rd!' }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd "(/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $MSSQL_SA_PASSWORD -Q 'SELECT 1' || /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $MSSQL_SA_PASSWORD -C -Q 'SELECT 1') || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    env:
      DOTNET_NOLOGO: true
      CI_SQL_SA_PASSWORD: ${{ secrets.CI_SQL_SA_PASSWORD != '' && secrets.CI_SQL_SA_PASSWORD || 'Invoria_CI_Strong_P@ssw0rd!' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore Invoria.sln

      - name: Build solution
        run: dotnet build Invoria.sln --configuration Release --no-restore

      - name: Install sqlcmd client
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl -fsSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev

      - name: Wait for SQL Server readiness
        shell: bash
        run: |
          for i in {1..30}; do
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$CI_SQL_SA_PASSWORD" -C -Q "SELECT 1" && break
            if [ "$i" -eq 30 ]; then
              echo "SQL Server did not become ready in time."
              exit 1
            fi
            sleep 2
          done

      - name: Run tests with isolated databases
        shell: pwsh
        env:
          SA_PASSWORD: ${{ env.CI_SQL_SA_PASSWORD }}
        run: ./.github/scripts/run-tests-with-db.ps1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: error
